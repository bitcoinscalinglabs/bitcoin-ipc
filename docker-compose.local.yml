name: bitcoin-ipc-local

services:
  bitcoin-ipc:
    build:
      context: .
      dockerfile: docker-deploy-local/Dockerfile
      args:
        # Set EMISSION_CHAIN_FEATURES=true to enable; unset = false
        EMISSION_CHAIN_FEATURES: "${EMISSION_CHAIN_FEATURES:-false}"
    image: bitcoin-ipc:latest
    container_name: bitcoin-ipc
    volumes:
      # Mount entire /root directory for persistence (Bitcoin data, IPC config, etc.)
      - root-data:/root
      # Bind-mount entrypoint script for fast iteration (no rebuild needed)
      - ./docker-deploy-local/docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh:ro
      # Bind-mount scripts for quick subnet bootstrap
      - ./scripts/bootstrap_subnet_a_from_container.sh:/usr/local/bin/bootstrap_subnet_a_from_container.sh:ro
      - ./scripts/bootstrap_subnet_b_from_container.sh:/usr/local/bin/bootstrap_subnet_b_from_container.sh:ro
      # Bind-mount scripts for quick validator spin-up
      - ./scripts/spin_up_subnet_a_from_container.sh:/usr/local/bin/spin_up_subnet_a_from_container.sh:ro
      - ./scripts/spin_up_subnet_b_from_container.sh:/usr/local/bin/spin_up_subnet_b_from_container.sh:ro
      # The next two mounts are: from container's /root/.ipc to host's $HOME/.ipc,
      # from that to container's $HOME/.ipc ($HOME is evaluated to the host's $HOME).
      # This is for some ipc-cli commands to work properly from inside the container.
      - $HOME/.ipc:/root/.ipc
      - $HOME/.ipc:/$HOME/.ipc
      # Mount Docker socket so calls to docker from the container are handled by the host's Docker daemon
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - RUST_LOG=${RUST_LOG:-debug}
      - HOST_HOME_DIR=$HOME
      # IPC addresses and whitelist (default values, can be overridden from host)
      - IPC_ADDRESS_OF_VALIDATOR_1=${IPC_ADDRESS_OF_VALIDATOR_1:-0x27b60d9f71d6806cca7d5a92b391093fe100f8e8}
      - IPC_ADDRESS_OF_VALIDATOR_2=${IPC_ADDRESS_OF_VALIDATOR_2:-0xd9c4c92ca843a53bff146c79b5d32ca4b9321414}
      - IPC_ADDRESS_OF_VALIDATOR_3=${IPC_ADDRESS_OF_VALIDATOR_3:-0x646aed5404567ae15648e9b9b0004cbafb126949}
      - IPC_ADDRESS_OF_VALIDATOR_4=${IPC_ADDRESS_OF_VALIDATOR_4:-0xbce2f194e9628e6ae06fa0d85dd57cd5579213bf}
      - IPC_ADDRESS_OF_VALIDATOR_5=${IPC_ADDRESS_OF_VALIDATOR_5:-0xb628237ff4875b039ec1c3dedcf5fad93430ee4a}
      - IPC_ADDRESS_OF_VALIDATOR_6=${IPC_ADDRESS_OF_VALIDATOR_6:-0x2aff4f2c3654acf4247e13aca3b4a0a52f340e25}
      - IPC_ADDRESS_OF_USER_1=${IPC_ADDRESS_OF_USER_1:-0x005e05dd763dd125473f8889726f7c305e50fcae}
      - IPC_ADDRESS_OF_USER_2=${IPC_ADDRESS_OF_USER_2:-0xa78bc5d61e0da3c2d96e29a495f4e358d8d2218d}
      - WHITELIST=${WHITELIST:-5f0dfed3a527ac740c7d4a594cd3aa1059a936187399fc49e3fc6ea6ae177268,851c1bda327584479e98a7c28ea7adc097d290efd105310bcf714231bb99faf4,b15f99928f2478a10c5739a03f5495d342e77352d624e7cc8ebfbded544f9ac0,b45fd52573e8e6bfe0aff82fb228e887fdd92210fe0952ae65a59080fec7e529}
    ports:
      # Bitcoin RPC port
      # - "18443:18443"
      # Provider ports (for multiple validators)
      - "3030:3030"  # validator1
      - "3031:3031"  # validator2
      - "3032:3032"  # validator3
      - "3033:3033"  # validator4
      - "3034:3034"  # validator5
      - "3035:3035"  # validator6
      # User provider ports
      - "3040:3040"  # user1
      - "3041:3041"  # user2
    working_dir: /workspace
    # Keep container running
    command: tail -f /dev/null

volumes:
  root-data:
    name: bitcoin-ipc-local_root-data
